<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOEMA — On Memory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: #050505;
            color: #ffffff;
            font-family: system-ui, -apple-system, "SF Pro Display", "Segoe UI", sans-serif;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        #breadcrumb {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #breadcrumb.visible {
            opacity: 1;
        }

        .breadcrumb-dot {
            width: 8px;
            height: 8px;
            background: #ffffff;
            border-radius: 50%;
            opacity: 0.5;
        }

        .breadcrumb-arrow {
            color: #ffffff;
            opacity: 0.3;
            font-size: 12px;
        }

        #canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            max-width: 600px;
            max-height: 600px;
        }

        .thought-circle {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .seed-thought {
            width: 60px;
            height: 60px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .sub-thought {
            width: 28px;
            height: 28px;
        }

        .sub-thought.focused {
            width: 34px;
            height: 34px;
            box-shadow: 0 0 0 2px #ffffff;
        }

        .selection-arc {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-color: transparent transparent #ffffff transparent;
            transform: rotate(45deg);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #content-card {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #111111;
            border-radius: 16px;
            padding: 20px;
            transform: translateY(120%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #content-card.visible {
            transform: translateY(0);
        }

        #thought-title {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', sans-serif;
            font-weight: 600;
            font-size: 18px;
            line-height: 1.3;
            margin-bottom: 12px;
            color: #ffffff;
        }

        #thought-text {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 16px;
            color: #ffffff;
        }

        #progress-bar {
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 1px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: #ffffff;
            width: 0%;
            transition: width 0.1s linear;
        }

        #navigation {
            display: flex;
            gap: 12px;
        }

        .nav-button {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .nav-button:active {
            transform: scale(0.95);
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div id="loading">Loading thoughts...</div>
    
    <div id="breadcrumb"></div>
    
    <div id="canvas">
        <!-- Thoughts will be rendered here -->
    </div>
    
    <div id="content-card">
        <div id="thought-title"></div>
        <div id="thought-text"></div>
        <div id="progress-bar">
            <div id="progress-fill"></div>
        </div>
        <div id="navigation">
            <button class="nav-button" id="back-button" style="display: none;">← Back</button>
            <button class="nav-button" id="branch-button" style="display: none;">Branch →</button>
        </div>
    </div>
    
    <audio id="audio-player"></audio>
    
    <script>
        // Thought tree data (will be populated from JSON)
        let thoughtTree = null;
        let currentRoot = null;
        let currentThoughts = [];
        let focusedIndex = 0;
        let navigationStack = [];
        let audioElement = document.getElementById('audio-player');
        let isDragging = false;
        let dragAngle = 0;
        let lastAngle = 0;
        let rotation = 0;
        
        // Load thought tree
        fetch('./thought-tree.json')
            .then(res => res.json())
            .then(data => {
                thoughtTree = data;
                currentRoot = thoughtTree.seed;
                document.getElementById('loading').style.display = 'none';
                renderThoughts();
            })
            .catch(err => {
                document.getElementById('loading').textContent = 'Error loading thoughts';
                console.error(err);
            });
        
        function renderThoughts() {
            const canvas = document.getElementById('canvas');
            canvas.innerHTML = '';
            
            // Render seed thought
            const seed = document.createElement('div');
            seed.className = 'thought-circle seed-thought';
            seed.dataset.thoughtId = currentRoot.id;
            canvas.appendChild(seed);
            
            // Get sub-thoughts
            currentThoughts = [];
            if (currentRoot.children) {
                currentRoot.children.forEach(childId => {
                    currentThoughts.push(thoughtTree.thoughts[childId]);
                });
            }
            
            // Render sub-thoughts in a circle
            const radius = 150;
            const angleStep = (2 * Math.PI) / currentThoughts.length;
            
            currentThoughts.forEach((thought, index) => {
                const angle = rotation + index * angleStep - Math.PI / 2;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                
                const circle = document.createElement('div');
                circle.className = 'thought-circle sub-thought';
                circle.dataset.thoughtId = thought.id;
                circle.dataset.index = index;
                circle.style.left = `calc(50% + ${x}px)`;
                circle.style.top = `calc(50% + ${y}px)`;
                circle.style.transform = 'translate(-50%, -50%)';
                
                canvas.appendChild(circle);
            });
            
            // Set initial focus
            updateFocus();
            updateBreadcrumb();
        }
        
        function updateFocus() {
            // Remove previous focus
            document.querySelectorAll('.sub-thought').forEach(el => {
                el.classList.remove('focused');
            });
            
            if (currentThoughts.length === 0) return;
            
            // Find the thought closest to 6 o'clock position
            let closestIndex = 0;
            let closestDistance = Infinity;
            const targetAngle = Math.PI / 2; // 6 o'clock
            
            currentThoughts.forEach((thought, index) => {
                const angleStep = (2 * Math.PI) / currentThoughts.length;
                const angle = (rotation + index * angleStep) % (2 * Math.PI);
                const normalizedAngle = angle < 0 ? angle + 2 * Math.PI : angle;
                
                let distance = Math.abs(normalizedAngle - targetAngle);
                if (distance > Math.PI) distance = 2 * Math.PI - distance;
                
                if (distance < closestDistance) {
                    closestDistance = distance;
                    closestIndex = index;
                }
            });
            
            focusedIndex = closestIndex;
            
            // Add focus to the selected thought
            const focusedElement = document.querySelector(`[data-index="${focusedIndex}"]`);
            if (focusedElement) {
                focusedElement.classList.add('focused');
            }
            
            // Update content card
            updateContentCard();
            
            // Play audio
            playThoughtAudio(currentThoughts[focusedIndex]);
        }
        
        function updateContentCard() {
            if (currentThoughts.length === 0) {
                document.getElementById('content-card').classList.remove('visible');
                return;
            }
            
            const thought = currentThoughts[focusedIndex];
            document.getElementById('thought-title').textContent = thought.title || '';
            document.getElementById('thought-text').textContent = thought.text;
            document.getElementById('content-card').classList.add('visible');
            
            // Update navigation buttons
            document.getElementById('back-button').style.display = navigationStack.length > 0 ? 'block' : 'none';
            document.getElementById('branch-button').style.display = thought.children && thought.children.length > 0 ? 'block' : 'none';
        }
        
        function updateBreadcrumb() {
            const breadcrumb = document.getElementById('breadcrumb');
            breadcrumb.innerHTML = '';
            
            if (navigationStack.length === 0) {
                breadcrumb.classList.remove('visible');
                return;
            }
            
            breadcrumb.classList.add('visible');
            
            // Add root dot
            const rootDot = document.createElement('div');
            rootDot.className = 'breadcrumb-dot';
            breadcrumb.appendChild(rootDot);
            
            // Add dots for each level
            navigationStack.forEach(() => {
                const arrow = document.createElement('span');
                arrow.className = 'breadcrumb-arrow';
                arrow.textContent = '→';
                breadcrumb.appendChild(arrow);
                
                const dot = document.createElement('div');
                dot.className = 'breadcrumb-dot';
                breadcrumb.appendChild(dot);
            });
        }
        
        function playThoughtAudio(thought) {
            audioElement.pause();
            audioElement.src = `./audio/thought-${thought.id}.mp3`;
            audioElement.play().catch(err => {
                console.log('Audio playback failed:', err);
            });
        }
        
        // Audio progress tracking
        audioElement.addEventListener('timeupdate', () => {
            if (audioElement.duration) {
                const progress = (audioElement.currentTime / audioElement.duration) * 100;
                document.getElementById('progress-fill').style.width = `${progress}%`;
            }
        });
        
        audioElement.addEventListener('ended', () => {
            document.getElementById('progress-fill').style.width = '0%';
        });
        
        // Navigation
        document.getElementById('branch-button').addEventListener('click', () => {
            if (currentThoughts.length === 0) return;
            
            const thought = currentThoughts[focusedIndex];
            if (!thought.children || thought.children.length === 0) return;
            
            // Push current state to stack
            navigationStack.push({
                root: currentRoot,
                rotation: rotation,
                focusedIndex: focusedIndex
            });
            
            // Set new root
            currentRoot = thought;
            rotation = 0;
            focusedIndex = 0;
            
            // Animate transition
            const seedElement = document.querySelector('.seed-thought');
            const focusedElement = document.querySelector('.sub-thought.focused');
            
            if (focusedElement && seedElement) {
                const rect = focusedElement.getBoundingClientRect();
                const seedRect = seedElement.getBoundingClientRect();
                
                // Animate focused thought to center
                focusedElement.style.transition = 'all 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
                focusedElement.style.left = '50%';
                focusedElement.style.top = '50%';
                focusedElement.style.width = '60px';
                focusedElement.style.height = '60px';
                
                // Fade out other thoughts
                document.querySelectorAll('.sub-thought:not(.focused)').forEach(el => {
                    el.style.transition = 'opacity 0.3s ease';
                    el.style.opacity = '0';
                });
                
                // Fade out seed
                seedElement.style.transition = 'opacity 0.3s ease';
                seedElement.style.opacity = '0';
                
                setTimeout(() => {
                    renderThoughts();
                }, 500);
            } else {
                renderThoughts();
            }
        });
        
        document.getElementById('back-button').addEventListener('click', () => {
            if (navigationStack.length === 0) return;
            
            const previousState = navigationStack.pop();
            currentRoot = previousState.root;
            rotation = previousState.rotation;
            focusedIndex = previousState.focusedIndex;
            
            renderThoughts();
        });
        
        // Touch/mouse interaction for dial rotation
        function getAngle(x, y) {
            const canvas = document.getElementById('canvas');
            const rect = canvas.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            return Math.atan2(y - centerY, x - centerX);
        }
        
        function handleStart(e) {
            const canvas = document.getElementById('canvas');
            if (!canvas.contains(e.target)) return;
            if (e.target.classList.contains('seed-thought')) return;
            
            isDragging = true;
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            dragAngle = getAngle(x, y);
            lastAngle = dragAngle;
        }
        
        function handleMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            const currentAngle = getAngle(x, y);
            
            let deltaAngle = currentAngle - lastAngle;
            
            // Handle angle wrapping
            if (deltaAngle > Math.PI) deltaAngle -= 2 * Math.PI;
            if (deltaAngle < -Math.PI) deltaAngle += 2 * Math.PI;
            
            rotation += deltaAngle;
            lastAngle = currentAngle;
            
            // Update positions
            const radius = 150;
            const angleStep = (2 * Math.PI) / currentThoughts.length;
            
            document.querySelectorAll('.sub-thought').forEach((circle, index) => {
                const angle = rotation + index * angleStep - Math.PI / 2;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                
                circle.style.left = `calc(50% + ${x}px)`;
                circle.style.top = `calc(50% + ${y}px)`;
            });
            
            updateFocus();
        }
        
        function handleEnd(e) {
            if (!isDragging) return;
            isDragging = false;
            
            // Snap to nearest position
            const angleStep = (2 * Math.PI) / currentThoughts.length;
            const targetRotation = Math.round(rotation / angleStep) * angleStep;
            
            // Animate to snap position
            const snapDelta = targetRotation - rotation;
            rotation = targetRotation;
            
            // Re-render with snap
            const radius = 150;
            document.querySelectorAll('.sub-thought').forEach((circle, index) => {
                const angle = rotation + index * angleStep - Math.PI / 2;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                
                circle.style.transition = 'all 0.2s cubic-bezier(0.4, 0, 0.2, 1)';
                circle.style.left = `calc(50% + ${x}px)`;
                circle.style.top = `calc(50% + ${y}px)`;
                
                setTimeout(() => {
                    circle.style.transition = '';
                }, 200);
            });
            
            updateFocus();
        }
        
        // Mouse events
        document.addEventListener('mousedown', handleStart);
        document.addEventListener('mousemove', handleMove);
        document.addEventListener('mouseup', handleEnd);
        
        // Touch events
        document.addEventListener('touchstart', handleStart, { passive: false });
        document.addEventListener('touchmove', handleMove, { passive: false });
        document.addEventListener('touchend', handleEnd);
        
        // Prevent default touch behavior
        document.addEventListener('touchstart', e => {
            if (e.target.closest('#canvas')) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
