<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOEMA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }

        body {
            background: #050505; color: #fff;
            font-family: system-ui, -apple-system, "SF Pro Display", "Segoe UI", sans-serif;
            overflow: hidden; height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #breadcrumb {
            position: absolute; top: 16px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 8px; align-items: center;
            opacity: 0; transition: opacity 0.3s; z-index: 20;
            background: rgba(0, 0, 0, 0.8);
            padding: 6px 14px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        #breadcrumb.visible { opacity: 1; }
        .breadcrumb-dot { width: 5px; height: 5px; background: #fff; border-radius: 50%; opacity: 0.5; }
        .breadcrumb-dot.active { opacity: 1; }
        .breadcrumb-arrow { color: #fff; opacity: 0.4; font-size: 9px; }

        #settings-button {
            position: absolute; top: 16px; right: 16px;
            width: 32px; height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            z-index: 25;
        }
        #settings-button:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        #settings-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: #111;
            box-shadow: -4px 0 20px rgba(0, 0, 0, 0.5);
            transition: right 0.3s ease;
            z-index: 30;
            padding: 20px;
            overflow-y: auto;
        }
        #settings-panel.open { right: 0; }

        #settings-panel h3 {
            margin-bottom: 16px;
            font-size: 18px;
            font-weight: 600;
        }

        #settings-panel pre {
            background: #222;
            padding: 16px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 60vh;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        #copy-button {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: all 0.15s;
        }

        #close-settings {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            color: #666;
            font-size: 20px;
            cursor: pointer;
        }

        /* Top graph area - 50% of screen */
        #canvas {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
            max-height: 50vh;
        }
        .canvas-inner { position: relative; width: 100%; height: 100%; max-width: 600px; }

        /* Nodes */
        .node {
            position: absolute; background: #fff; border-radius: 50%;
            cursor: pointer; transform: translate(-50%, -50%);
            transition: opacity 0.4s ease;
            opacity: 0.9;
        }
        .node.playing { opacity: 1 !important; }
        .node.hidden { display: none; }

        /* Seed */
        .node-seed { width: 52px; height: 52px; z-index: 12; }
        .node-seed.playing { 
            opacity: 1;
            box-shadow: 0 0 0 4px rgba(255,255,255,0.15), 0 0 0 8px rgba(255,255,255,0.06); 
        }

        /* Level 1 */
        .node-l1 { width: 24px; height: 24px; z-index: 11; transition: all 0.2s ease; }
        .node-l1.focused { width: 30px; height: 30px; }
        .node-l1.listened { opacity: 0.3; }
        .node-l1.listened.focused { opacity: 0.9; }
        .node-l1.focused.playing { opacity: 1; }

        /* Level 2 - smaller */
        .node-l2 { width: 10px; height: 10px; z-index: 10; opacity: 0.55; }
        .node-l2.has-children { opacity: 0.7; }

        /* Level 3 - tiny */
        .node-l3 { width: 5px; height: 5px; z-index: 9; opacity: 0.3; }

        /* Progress arc */
        .playing-arc {
            position: absolute; pointer-events: none; z-index: 13;
            transform: translate(-50%, -50%);
        }
        .playing-arc circle {
            fill: none; stroke: #fff; stroke-width: 1.5; stroke-linecap: round;
            transform-origin: center; transform: rotate(-90deg);
            transition: stroke-dashoffset 0.15s linear;
        }

        /* Bottom content - 50% of screen */
        #content-card {
            position: relative;
            height: 50vh;
            background: #111;
            border-radius: 20px 20px 0 0;
            padding: 20px 20px 20px;
            display: flex;
            flex-direction: column;
        }

        #thought-title { font-weight: 600; font-size: 15px; color: #fff; margin-bottom: 8px; }
        #thought-text { font-size: 13px; line-height: 1.65; color: #888; flex: 1; overflow-y: auto; margin-bottom: 14px; }
        #progress-bar { height: 2px; background: rgba(255,255,255,0.1); border-radius: 1px; margin-bottom: 16px; overflow: hidden; }
        #progress-fill { height: 100%; background: #fff; width: 0%; transition: width 0.1s linear; }

        /* Level navigation buttons */
        #level-navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            padding: 0 10px;
        }
        
        .level-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .level-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .level-btn:not(:disabled):hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.3);
        }
        .level-btn:active:not(:disabled) {
            transform: scale(0.9);
        }

        #play-pause-button {
            width: 60px; height: 60px;
            font-size: 24px;
            background: rgba(255,255,255,0.15);
        }

        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 11px; letter-spacing: 0.25em;
            color: rgba(255,255,255,0.25); text-transform: uppercase;
        }
        
        /* Mobile optimization */
        @media (max-height: 700px) {
            #breadcrumb { top: 10px; padding: 4px 12px; }
            #settings-button { top: 10px; right: 10px; width: 28px; height: 28px; font-size: 14px; }
            .node-seed { width: 48px; height: 48px; }
            .node-l1 { width: 22px; height: 22px; }
            .node-l1.focused { width: 28px; height: 28px; }
            #content-card { padding: 16px 16px 16px; }
            .level-btn { width: 44px; height: 44px; font-size: 18px; }
            #play-pause-button { width: 52px; height: 52px; font-size: 20px; }
        }
    </style>
</head>
<body>
    <div id="breadcrumb"></div>
    
    <button id="settings-button">⚙</button>
    
    <div id="settings-panel">
        <button id="close-settings">×</button>
        <h3>Structure</h3>
        <pre id="markdown-output"></pre>
        <button id="copy-button">Copy to Clipboard</button>
    </div>

    <div id="loading">Loading</div>

    <div id="canvas">
        <div class="canvas-inner"></div>
    </div>

    <div id="content-card">
        <h2 id="thought-title"></h2>
        <p id="thought-text"></p>
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <div id="level-navigation">
            <button class="level-btn" id="up-button" disabled>▲</button>
            <button class="level-btn" id="play-pause-button">▶</button>
            <button class="level-btn" id="down-button" disabled>▼</button>
        </div>
    </div>

    <audio id="audio-player" preload="none"></audio>

    <audio id="pop-sound-single" preload="auto">

    <script>
        const thoughtTree = {
            root: { id: 0, title: "Risk of Mass AI Unemployment", text: "How likely is it that Artificial Intelligence will cause massive unemployment in the next decade?", children: [1, 14, 26, 39, 52, 64] },
            thoughts: {
                0: { id: 0, title: "Risk of Mass AI Unemployment", text: "How likely is it that Artificial Intelligence will cause massive unemployment in the next decade?", children: [1, 14, 26, 39, 52, 64] },
                1: { id: 1, title: "Historical Context", text: "Technology has displaced workers throughout history, from the printing press to the assembly line. Each time, new jobs emerged we couldn't previously imagine.", children: [2, 6, 10] },
                2: { id: 2, title: "Industrial Revolution Pattern", text: "The Industrial Revolution eliminated millions of agricultural jobs, yet created entirely new industries and professions. The transition was painful but ultimately led to higher living standards.", children: [3, 4, 5] },
                3: { id: 3, title: "Timing Matters", text: "Industrial transitions took generations. Workers had time to adapt, and their children entered different fields. AI change might happen in years, not decades." },
                4: { id: 4, title: "Social Safety Nets", text: "During industrialization, we lacked unemployment insurance, retraining programs, or social security. Modern societies have tools to manage transitions." },
                5: { id: 5, title: "Skills Mismatch", text: "Factory work required similar physical skills to farming. The jump from truck driver to data analyst is far greater." },
                6: { id: 6, title: "The Automation Paradox", text: "ATMs were supposed to eliminate bank tellers. Instead, they made branches cheaper to operate, banks opened more branches, and teller employment actually increased.", children: [7, 8, 9] },
                7: { id: 7, title: "Complement vs Substitute", text: "Technology often complements human work rather than replacing it. Spreadsheets didn't eliminate accountants - they made them more productive." },
                8: { id: 8, title: "New Task Creation", text: "As automation handles routine work, humans focus on creative, interpersonal, and strategic tasks that emerge from the new capabilities." },
                9: { id: 9, title: "The Productivity Dividend", text: "Higher productivity can lower prices, increase demand, and create more jobs in the same field - if the demand is elastic enough." },
                10: { id: 10, title: "This Time Might Be Different", text: "Previous automation replaced muscle. AI replaces minds. When machines can think, learn, and create, what uniquely human value remains?", children: [11, 12, 13] },
                11: { id: 11, title: "Cognitive Capabilities", text: "AI already matches or exceeds humans in many cognitive tasks - from chess to medical diagnosis. The scope of 'human-only' work shrinks daily." },
                12: { id: 12, title: "General vs Narrow AI", text: "Current AI excels at specific tasks. Artificial General Intelligence that matches human flexibility remains elusive, possibly decades away." },
                13: { id: 13, title: "Economic Value of Consciousness", text: "Even if AI matches our capabilities, will people pay premium for human touch? We still prefer handmade goods and human performers." },
                14: { id: 14, title: "Current Labor Market Signals", text: "Despite rapid AI advancement, unemployment remains near historic lows in many developed nations. Where are the jobless masses?", children: [15, 19, 23] },
                15: { id: 15, title: "The Great Reshuffling", text: "Workers are changing jobs at record rates, moving from declining sectors to growing ones. The churn is high, but employment remains strong.", children: [16, 17, 18] },
                16: { id: 16, title: "Wage Polarization", text: "High-skill and low-skill jobs grow, while middle-skill jobs disappear. The barbell economy creates inequality even with full employment." },
                17: { id: 17, title: "Geographic Displacement", text: "Jobs concentrate in superstar cities while rural areas hollow out. The jobs exist, but not where people live." },
                18: { id: 18, title: "Quality vs Quantity", text: "Gig economy and part-time work mask underemployment. People have jobs, but not careers with benefits and security." },
                19: { id: 19, title: "Leading Indicators", text: "Unemployment is a lagging indicator. By the time mass joblessness appears, the damage is done. Watch investment patterns and hiring freezes.", children: [20, 21, 22] },
                20: { id: 20, title: "Corporate AI Spending", text: "Companies pour billions into AI not to expand but to cut costs. Every efficiency gain potentially means fewer workers needed." },
                21: { id: 21, title: "Startup Job Creation", text: "Modern tech startups create fewer jobs than industrial predecessors. Instagram had 13 employees when Facebook bought it for $1 billion." },
                22: { id: 22, title: "The Productivity Puzzle", text: "If AI is so transformative, why isn't productivity soaring? Perhaps the revolution is building but hasn't yet reached critical mass." },
                23: { id: 23, title: "Skills Gap Reality", text: "Millions of jobs go unfilled while millions seek work. The mismatch between skills needed and skills available grows wider.", children: [24, 25] },
                24: { id: 24, title: "Education Lag", text: "Universities teach outdated curricula. By graduation, students' skills are already obsolete. The education system can't keep pace with change." },
                25: { id: 25, title: "Retraining Challenges", text: "Mid-career workers struggle to acquire new technical skills. Online courses have low completion rates. Real retraining requires time and money most lack." },
                26: { id: 26, title: "Policy Responses", text: "Governments worldwide grapple with AI's implications. From Universal Basic Income to robot taxes, radical proposals enter mainstream discourse.", children: [27, 31, 35] },
                27: { id: 27, title: "Universal Basic Income", text: "Give everyone money to live, whether they work or not. Alaska's oil dividend provides a small-scale model, but nationwide implementation faces huge obstacles.", children: [28, 29, 30] },
                28: { id: 28, title: "Inflation Concerns", text: "If everyone gets $1000/month, won't rents just rise by $1000? Without addressing supply, UBI might just fuel inflation." },
                29: { id: 29, title: "Work Incentives", text: "Critics fear UBI destroys work ethic. Proponents argue it enables entrepreneurship and creative pursuits. Small pilots show mixed results." },
                30: { id: 30, title: "Political Feasibility", text: "UBI requires massive tax increases or spending cuts. In polarized democracies, achieving consensus seems nearly impossible." },
                31: { id: 31, title: "Job Guarantee Programs", text: "Government as employer of last resort, creating public works projects for anyone who wants a job. The New Deal provides historical precedent.", children: [32, 33, 34] },
                32: { id: 32, title: "Make-Work Concerns", text: "Creating jobs just to create jobs risks inefficiency. Soviet full employment led to 'we pretend to work, they pretend to pay us.'" },
                33: { id: 33, title: "Matching Skills to Needs", text: "Public needs are enormous - from infrastructure to eldercare. The challenge is matching unemployed workers' skills to social priorities." },
                34: { id: 34, title: "Private Sector Crowding", text: "If government offers guaranteed jobs, private employers must compete. This could drive up wages but also reduce business flexibility." },
                35: { id: 35, title: "Human-Centered Economy", text: "Shift focus from efficiency to human flourishing. Shorter work weeks, job sharing, and valuing care work could spread available work more broadly.", children: [36, 37, 38] },
                36: { id: 36, title: "Four-Day Work Week", text: "Trials show maintained productivity with better work-life balance. As AI boosts efficiency, humans could work less while maintaining living standards." },
                37: { id: 37, title: "Care Economy Expansion", text: "Aging populations need human care. Teaching, nursing, and social work resist automation. Properly valuing this work could employ millions." },
                38: { id: 38, title: "Measurement Challenges", text: "GDP measures production, not wellbeing. New economic metrics might value leisure, health, and happiness over pure output." },
                39: { id: 39, title: "Sectoral Disruption Patterns", text: "AI won't hit everywhere equally or simultaneously. Understanding which sectors face immediate risk helps predict unemployment patterns.", children: [40, 44, 48] },
                40: { id: 40, title: "White Collar Surprise", text: "Many assumed blue-collar jobs would go first. Instead, AI threatens lawyers, accountants, and analysts - anyone who manipulates information.", children: [41, 42, 43] },
                41: { id: 41, title: "Routine Cognitive Work", text: "Document review, basic analysis, report writing - AI excels at pattern recognition and synthesis. Junior professional roles face elimination." },
                42: { id: 42, title: "Creative Professions", text: "AI generates art, music, and writing. While top creatives remain valuable, mid-tier commercial work becomes automated." },
                43: { id: 43, title: "Professional Service Evolution", text: "Instead of replacing professionals, AI might augment them. One lawyer with AI could do the work of ten, changing the profession's structure." },
                44: { id: 44, title: "Physical Work Persistence", text: "Robots struggle with unstructured environments. Plumbers, electricians, and construction workers might outlast office workers.", children: [45, 46, 47] },
                45: { id: 45, title: "Dexterity Challenges", text: "Human hands perform millions of complex manipulations. Replicating this in varied real-world conditions remains extremely difficult and expensive." },
                46: { id: 46, title: "On-Site Requirement", text: "Many physical jobs require presence at unpredictable locations. The cost of mobile, adaptable robots exceeds human wages for now." },
                47: { id: 47, title: "Human Preference", text: "People trust humans in their homes. The social comfort with human service providers creates natural demand for human workers." },
                48: { id: 48, title: "Regulatory Protection", text: "Some jobs enjoy legal protection. Licenses, unions, and regulations slow automation in medicine, law, and other fields.", children: [49, 50, 51] },
                49: { id: 49, title: "Professional Licensing", text: "Doctors, lawyers, and accountants require licenses. Changing regulations to allow AI practice faces fierce resistance from professional associations." },
                50: { id: 50, title: "Liability Questions", text: "Who gets sued when AI makes mistakes? Until liability frameworks clarify, many fields will require human oversight and accountability." },
                51: { id: 51, title: "Union Resistance", text: "Strong unions negotiate automation limits. German auto workers secured guarantees about human employment levels in exchange for productivity gains." },
                52: { id: 52, title: "Timeline Uncertainties", text: "Predictions range from imminent catastrophe to gradual century-long transitions. The pace of change matters as much as the destination.", children: [53, 57, 61] },
                53: { id: 53, title: "Exponential vs Linear", text: "Humans think linearly but technology advances exponentially. The next decade might bring more change than the past century.", children: [54, 55, 56] },
                54: { id: 54, title: "The AI Winter Question", text: "AI has experienced boom-bust cycles before. Current enthusiasm might hit fundamental limits, slowing the transformation." },
                55: { id: 55, title: "Compound Effects", text: "AI improves AI development. As systems bootstrap their own improvement, change could accelerate beyond prediction." },
                56: { id: 56, title: "Implementation Lag", text: "Even revolutionary technology takes time to deploy. Companies must retool processes, retrain workers, and overcome organizational inertia." },
                57: { id: 57, title: "Demographic Buffers", text: "Aging populations create labor shortages in many countries. AI automation might arrive just in time to maintain living standards.", children: [58, 59, 60] },
                58: { id: 58, title: "The Dependency Ratio", text: "Fewer workers support more retirees. Without automation, taxes must rise dramatically or services must be cut." },
                59: { id: 59, title: "Immigration Politics", text: "Rich countries could import workers but face political resistance. AI offers a politically palatable alternative to immigration." },
                60: { id: 60, title: "Caregiving Demands", text: "Aging increases demand for human-touch services. While AI handles routine work, humans provide companionship and complex care." },
                61: { id: 61, title: "Black Swan Events", text: "Unexpected events could accelerate or derail AI deployment. Wars, pandemics, or breakthroughs create discontinuous change.", children: [62, 63] },
                62: { id: 62, title: "Regulatory Backlash", text: "A major AI catastrophe - deaths from autonomous vehicles, biased decisions, or privacy violations - could trigger severe restrictions." },
                63: { id: 63, title: "Breakthrough Acceleration", text: "A single lab achieving AGI could transform everything overnight. The winner-take-all dynamics of AI create unstable dynamics." },
                64: { id: 64, title: "Human Adaptation Capacity", text: "Humans have survived ice ages, plagues, and world wars. Our adaptability might surprise pessimists - if we act wisely.", children: [65, 69, 73, 77] },
                65: { id: 65, title: "New Job Categories", text: "Who predicted 'social media manager' or 'app developer' twenty years ago? Future jobs might be literally unimaginable today.", children: [66, 67, 68] },
                66: { id: 66, title: "AI Collaboration Roles", text: "Prompt engineers, AI trainers, and model therapists already emerge. Working with AI, not against it, creates new opportunities." },
                67: { id: 67, title: "Meaning Economy", text: "As material needs are met cheaply, people pay for purpose, community, and experiences. Human guides to meaning gain value." },
                68: { id: 68, title: "Neo-Artisan Movement", text: "Mass automation makes handcrafted goods more valuable. 'Made by humans' becomes a luxury brand." },
                69: { id: 69, title: "Education Revolution", text: "Crisis forces educational reform. Continuous learning, apprenticeships, and just-in-time training replace obsolete degree systems.", children: [70, 71, 72] },
                70: { id: 70, title: "Microcredentials", text: "Instead of four-year degrees, workers earn specific skill badges. Modular education allows rapid reskilling as needs change." },
                71: { id: 71, title: "AI-Powered Learning", text: "Personalized AI tutors make high-quality education universally accessible. The same force displacing workers enables their retraining." },
                72: { id: 72, title: "Learning While Earning", text: "Companies invest in continuous worker development. The line between working and learning blurs as adaptation becomes constant." },
                73: { id: 73, title: "Social Innovation", text: "Crisis spurs creativity. The Great Depression birthed Social Security. AI displacement might force equally dramatic social innovations.", children: [74, 75, 76] },
                74: { id: 74, title: "Ownership Models", text: "Worker cooperatives, profit sharing, and equity distribution spread automation benefits. The who-owns-the-robots question becomes central." },
                75: { id: 75, title: "Time Banking", text: "Alternative economies emerge where people trade hours of service. An hour of teaching equals an hour of plumbing, creating AI-proof exchange." },
                76: { id: 76, title: "Digital Commons", text: "Open-source AI and public data trusts ensure benefits flow broadly. Technology becomes public infrastructure like roads or internet." },
                77: { id: 77, title: "The Optimistic Scenario", text: "Perhaps we're birthing not unemployment but liberation. Humans freed from drudgery to pursue creativity, relationships, and self-actualization.", children: [78, 79, 80] },
                78: { id: 78, title: "The End of Scarcity", text: "AI plus renewable energy equals abundance. When machines provide all necessities cheaply, human work becomes voluntary self-expression." },
                79: { id: 79, title: "Renaissance 2.0", text: "Like Renaissance Florence, material abundance enables cultural flowering. Everyone becomes an artist, philosopher, or inventor." },
                80: { id: 80, title: "Star Trek Economics", text: "Science fiction imagined post-scarcity societies focused on exploration and growth. Fiction might become blueprint for reality." }
            }
        };

        // Audio and state
        const audioEl = document.getElementById('audio-player');
        const popSingle = document.getElementById('pop-sound-single');
        const popDouble = document.getElementById('pop-sound-double');
        
        let currentRoot = thoughtTree.root;
        let currentThoughts = [];
        let navigationStack = [];
        let rotation = Math.PI; // Start at bottom
        let focusedIndex = 0;
        let isDragging = false;
        let lastAngle = 0;
        let currentArc = null;
        let listenedSet = new Set();
        let layout = [];
        let playedAtLevel = new Map();
        let isPlaying = false;
        let currentlyPlayingNode = null;

        // Mobile-optimized geometry
        const R1 = 90;  // L1 orbit
        const R2 = 28;  // L2 orbit
        const R3 = 10;  // L3 orbit
        const seedPos = () => {
            const canvas = document.getElementById('canvas');
            return {
                x: canvas.offsetWidth / 2,
                y: canvas.offsetHeight / 2
            };
        };

        // UI Elements
        const upButton = document.getElementById('up-button');
        const downButton = document.getElementById('down-button');
        const playPauseButton = document.getElementById('play-pause-button');
        const settingsButton = document.getElementById('settings-button');
        const settingsPanel = document.getElementById('settings-panel');
        const closeSettings = document.getElementById('close-settings');
        const copyButton = document.getElementById('copy-button');
        const markdownOutput = document.getElementById('markdown-output');

        // Settings panel
        settingsButton.addEventListener('click', () => {
            generateMarkdown();
            settingsPanel.classList.add('open');
        });

        closeSettings.addEventListener('click', () => {
            settingsPanel.classList.remove('open');
        });

        copyButton.addEventListener('click', () => {
            const text = markdownOutput.textContent;
            navigator.clipboard.writeText(text).then(() => {
                copyButton.textContent = 'Copied!';
                setTimeout(() => {
                    copyButton.textContent = 'Copy to Clipboard';
                }, 2000);
            });
        });

        function generateMarkdown() {
            let markdown = '';
            
            function traverseThought(thought, depth = 0) {
                const prefix = '#'.repeat(depth + 1);
                markdown += `${prefix} ${thought.title || 'Untitled'}\n\n${thought.text}\n\n`;
                
                if (thought.children) {
                    thought.children.forEach(childId => {
                        const child = thoughtTree.thoughts[childId];
                        if (child) traverseThought(child, depth + 1);
                    });
                }
            }
            
            traverseThought(currentRoot, 0);
            markdownOutput.textContent = markdown;
        }

        // Navigation buttons
        upButton.addEventListener('click', () => {
            if (navigationStack.length > 0) {
                popDouble.currentTime = 0;
                popDouble.play();
                goUp();
            }
        });

        downButton.addEventListener('click', () => {
            const focused = getFocusedThought();
            if (focused?.children?.length) {
                popDouble.currentTime = 0;
                popDouble.play();
                goDeeper();
            }
        });

        playPauseButton.addEventListener('click', () => {
            if (isPlaying) {
                pausePlayback();
            } else {
                startPlayback();
            }
        });

        function updateButtonStates() {
            upButton.disabled = navigationStack.length === 0;
            
            const focused = getFocusedThought();
            downButton.disabled = !focused?.children?.length;
            
            playPauseButton.textContent = isPlaying ? '⏸' : '▶';
        }

        // Initialize
        window.addEventListener('load', () => {
            document.getElementById('loading').style.display = 'none';
            renderAll();
            updateButtonStates();
        });

        // Render scene
        function renderAll() {
            const ci = document.querySelector('.canvas-inner');
            ci.innerHTML = '';
            
            // Seed node
            const seed = document.createElement('div');
            seed.className = 'node node-seed';
            const { x: cx, y: cy } = seedPos();
            seed.style.left = cx + 'px'; seed.style.top = cy + 'px';
            seed.addEventListener('click', onSeedClick);
            ci.appendChild(seed);

            // Current thoughts
            currentThoughts = currentRoot.children?.map(id => thoughtTree.thoughts[id]) || [];
            const step1 = currentThoughts.length ? (2 * Math.PI) / currentThoughts.length : 0;
            layout = [];

            // At top level, show all nodes. Otherwise, only show current level
            const showAllNodes = navigationStack.length === 0;

            currentThoughts.forEach((t1, i) => {
                const angle1 = rotation + i * step1 - Math.PI / 2;
                const x1 = cx + Math.cos(angle1) * R1;
                const y1 = cy + Math.sin(angle1) * R1;

                const el1 = document.createElement('div');
                el1.className = 'node node-l1';
                if (listenedSet.has(t1.id)) el1.classList.add('listened');
                el1.style.left = x1 + 'px'; el1.style.top = y1 + 'px';
                el1.addEventListener('click', () => onL1Click(i));
                ci.appendChild(el1);

                const entry = { thought: t1, x: x1, y: y1, el: el1, children: [] };
                layout.push(entry);

                if (showAllNodes) {
                    // L2: children of L1
                    const l2thoughts = (t1.children || []).map(id => thoughtTree.thoughts[id]);
                    const step2 = l2thoughts.length ? (2 * Math.PI) / l2thoughts.length : 0;
                    l2thoughts.forEach((t2, j) => {
                        const angle2 = j * step2 - Math.PI / 2;
                        const x2 = x1 + Math.cos(angle2) * R2;
                        const y2 = y1 + Math.sin(angle2) * R2;

                        const el2 = document.createElement('div');
                        el2.className = 'node node-l2';
                        if (t2.children?.length) el2.classList.add('has-children');
                        el2.style.left = x2 + 'px'; el2.style.top = y2 + 'px';
                        ci.appendChild(el2);

                        const entry2 = { thought: t2, x: x2, y: y2, el: el2, parentIndex: i, childIndex: j };
                        entry.children.push(entry2);

                        // L3: children of L2
                        const l3thoughts = (t2.children || []).map(id => thoughtTree.thoughts[id]);
                        const step3 = l3thoughts.length ? (2 * Math.PI) / l3thoughts.length : 0;
                        l3thoughts.forEach((t3, k) => {
                            const angle3 = k * step3 - Math.PI / 2;
                            const el3 = document.createElement('div');
                            el3.className = 'node node-l3';
                            el3.style.left = (x2 + Math.cos(angle3) * R3) + 'px';
                            el3.style.top  = (y2 + Math.sin(angle3) * R3) + 'px';
                            ci.appendChild(el3);
                        });
                    });
                }
            });

            updateBreadcrumb();
            applyFocus();
            updateButtonStates();
        }

        function onL1Click(index) {
            if (index === focusedIndex) {
                if (layout[index].thought.children?.length) {
                    downButton.click();
                } else {
                    startPlayback();
                }
            } else {
                popSingle.currentTime = 0;
                popSingle.play();
                focusedIndex = index;
                snapToBottom(index);
                repositionAll();
                applyFocus();
            }
        }

        function onSeedClick() {
            if (navigationStack.length > 0) {
                upButton.click();
            } else {
                startPlayback();
            }
        }

        // Reposition nodes
        function repositionAll() {
            const { x: cx, y: cy } = seedPos();
            const step1 = currentThoughts.length ? (2 * Math.PI) / currentThoughts.length : 0;

            layout.forEach((entry, i) => {
                const angle1 = rotation + i * step1 - Math.PI / 2;
                const x1 = cx + Math.cos(angle1) * R1;
                const y1 = cy + Math.sin(angle1) * R1;
                entry.x = x1; entry.y = y1;
                entry.el.style.left = x1 + 'px'; entry.el.style.top = y1 + 'px';

                if (entry.children.length) {
                    const step2 = entry.children.length ? (2 * Math.PI) / entry.children.length : 0;
                    entry.children.forEach((c, j) => {
                        const angle2 = j * step2 - Math.PI / 2;
                        const x2 = x1 + Math.cos(angle2) * R2;
                        const y2 = y1 + Math.sin(angle2) * R2;
                        c.x = x2; c.y = y2;
                        c.el.style.left = x2 + 'px'; c.el.style.top = y2 + 'px';
                    });
                }
            });

            if (currentArc && layout[focusedIndex]) {
                const { x, y } = layout[focusedIndex];
                currentArc.style.left = x + 'px'; currentArc.style.top = y + 'px';
            }
        }

        // Focus management
        function getFocusedIndex() {
            if (!currentThoughts.length) return 0;
            const step1 = (2 * Math.PI) / currentThoughts.length;
            const target = Math.PI / 2; // bottom
            let best = 0, bestD = Infinity;
            currentThoughts.forEach((_, i) => {
                let a = ((rotation + i * step1) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
                let d = Math.abs(a - target);
                if (d > Math.PI) d = 2 * Math.PI - d;
                if (d < bestD) { bestD = d; best = i; }
            });
            return best;
        }

        function getFocusedThought() {
            return currentThoughts[focusedIndex] || currentRoot;
        }

        function applyFocus() {
            layout.forEach(e => e.el.classList.remove('focused'));
            if (!layout.length) {
                updateContentCard(currentRoot);
                return;
            }
            focusedIndex = getFocusedIndex();
            layout[focusedIndex].el.classList.add('focused');
            const t = layout[focusedIndex].thought;
            updateContentCard(t);
        }

        function snapToBottom(idx) {
            const step = (2 * Math.PI) / currentThoughts.length;
            rotation = Math.PI - idx * step;
        }

        // Navigation
        function goUp() {
            if (!navigationStack.length) return;
            const p = navigationStack.pop();
            currentRoot = p.root;
            rotation = p.rotation;
            focusedIndex = p.focusedIndex;
            renderAll();
        }

        function goDeeper() {
            const t = currentThoughts[focusedIndex];
            if (!t?.children?.length) return;
            navigationStack.push({ root: currentRoot, rotation, focusedIndex });
            currentRoot = t;
            rotation = Math.PI;
            focusedIndex = 0;
            renderAll();
            startPlayback(); // Auto-play when diving deeper
        }

        // Audio playback
        function startPlayback() {
            const node = getFocusedThought();
            if (!node) return;
            
            audioEl.pause();
            removeArc();
            
            const depth = navigationStack.length;
            const levelKey = `${depth}-${currentThoughts.length ? 'sub' : 'seed'}`;
            
            if (!playedAtLevel.has(levelKey)) {
                playedAtLevel.set(levelKey, new Set());
            }
            
            audioEl.src = `./audio/thought-${node.id}.mp3`;
            updateContentCard(node);
            
            audioEl.play().then(() => {
                isPlaying = true;
                currentlyPlayingNode = node;
                updateButtonStates();
                
                if (navigationStack.length === 0) {
                    document.querySelector('.node-seed')?.classList.add('playing');
                } else {
                    layout.forEach(e => e.el.classList.remove('playing'));
                    layout[focusedIndex]?.el.classList.add('playing');
                    createArc(layout[focusedIndex]);
                }
                
                listenedSet.add(node.id);
                playedAtLevel.get(levelKey).add(node.id);
                
                if (layout[focusedIndex]) {
                    layout[focusedIndex].el.classList.add('listened');
                }
            }).catch(() => {});
        }

        function pausePlayback() {
            audioEl.pause();
            isPlaying = false;
            removeArc();
            document.querySelector('.node-seed')?.classList.remove('playing');
            layout.forEach(e => e.el.classList.remove('playing'));
            updateButtonStates();
        }

        function createArc(entry) {
            if (!entry) return;
            removeArc();
            const size = (entry.el.offsetWidth || 24) + 10;
            const r = size / 2 - 2;
            const circ = 2 * Math.PI * r;

            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.classList.add('playing-arc');
            svg.setAttribute('width', size);
            svg.setAttribute('height', size);
            svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
            svg.style.left = entry.x + 'px';
            svg.style.top = entry.y + 'px';

            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', size / 2);
            circle.setAttribute('cy', size / 2);
            circle.setAttribute('r', r);
            circle.style.strokeDasharray = circ;
            circle.style.strokeDashoffset = circ;
            svg.appendChild(circle);

            document.querySelector('.canvas-inner').appendChild(svg);
            currentArc = svg;
            currentArc._circ = circ;
        }

        function removeArc() {
            if (currentArc) {
                currentArc.remove();
                currentArc = null;
            }
        }

        // Audio events
        audioEl.addEventListener('timeupdate', () => {
            if (!audioEl.duration) return;
            const pct = audioEl.currentTime / audioEl.duration;
            document.getElementById('progress-fill').style.width = `${pct * 100}%`;
            if (currentArc?._circ) {
                const c = currentArc.querySelector('circle');
                if (c) c.style.strokeDashoffset = currentArc._circ * (1 - pct);
            }
        });

        audioEl.addEventListener('ended', () => {
            document.getElementById('progress-fill').style.width = '0%';
            isPlaying = false;
            removeArc();
            document.querySelector('.node-seed')?.classList.remove('playing');
            layout.forEach(e => e.el.classList.remove('playing'));
            updateButtonStates();
            
            // Auto-advance logic
            if (currentThoughts.length > 0) {
                const next = (focusedIndex + 1) % currentThoughts.length;
                if (next !== focusedIndex) {
                    popSingle.currentTime = 0;
                    popSingle.play();
                    focusedIndex = next;
                    snapToBottom(next);
                    repositionAll();
                    applyFocus();
                    // Auto-play next
                    setTimeout(() => startPlayback(), 500);
                }
            }
        });

        audioEl.addEventListener('pause', () => {
            isPlaying = false;
            updateButtonStates();
        });

        // Content card
        function updateContentCard(node) {
            document.getElementById('thought-title').textContent = node.title || '';
            document.getElementById('thought-text').textContent = node.text;
            updateButtonStates();
        }

        // Touch drag
        function getAngle(x, y) {
            const r = document.querySelector('.canvas-inner').getBoundingClientRect();
            const { x: cx, y: cy } = seedPos();
            return Math.atan2(y - (r.top + cy), x - (r.left + cx));
        }

        function handleStart(e) {
            if (!document.getElementById('canvas').contains(e.target)) return;
            if (e.target.classList.contains('node-seed')) return;
            isDragging = true;
            const p = e.touches ? e.touches[0] : e;
            lastAngle = getAngle(p.clientX, p.clientY);
        }
        
        function handleMove(e) {
            if (!isDragging || !currentThoughts.length) return;
            e.preventDefault();
            const p = e.touches ? e.touches[0] : e;
            const cur = getAngle(p.clientX, p.clientY);
            let d = cur - lastAngle;
            if (d > Math.PI) d -= 2 * Math.PI;
            if (d < -Math.PI) d += 2 * Math.PI;
            rotation += d;
            lastAngle = cur;
            
            const oldFocused = focusedIndex;
            repositionAll();
            const newFocused = getFocusedIndex();
            if (oldFocused !== newFocused) {
                popSingle.currentTime = 0;
                popSingle.play();
            }
            applyFocus();
        }
        
        function handleEnd() {
            if (!isDragging) return;
            isDragging = false;
            if (!currentThoughts.length) return;
            focusedIndex = getFocusedIndex();
            snapToBottom(focusedIndex);
            repositionAll();
            applyFocus();
        }

        document.addEventListener('mousedown', handleStart);
        document.addEventListener('mousemove', handleMove);
        document.addEventListener('mouseup', handleEnd);
        document.addEventListener('touchstart', handleStart, { passive: false });
        document.addEventListener('touchmove', handleMove, { passive: false });
        document.addEventListener('touchend', handleEnd);
        window.addEventListener('resize', () => {
            renderAll();
        });

        // Breadcrumb
        function updateBreadcrumb() {
            const bc = document.getElementById('breadcrumb');
            bc.innerHTML = '';
            if (!navigationStack.length) {
                bc.classList.remove('visible');
                return;
            }
            bc.classList.add('visible');
            
            bc.appendChild(Object.assign(document.createElement('div'), { className: 'breadcrumb-dot' }));
            
            navigationStack.forEach((_, idx) => {
                bc.appendChild(Object.assign(document.createElement('span'), { className: 'breadcrumb-arrow', textContent: '›' }));
                bc.appendChild(Object.assign(document.createElement('div'), { className: 'breadcrumb-dot' }));
            });
            
            const dots = bc.querySelectorAll('.breadcrumb-dot');
            if (dots.length) dots[dots.length - 1].classList.add('active');
        }
    </script>
</body>
</html>
