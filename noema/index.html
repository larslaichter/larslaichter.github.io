<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOEMA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }

        body {
            background: #050505;
            color: #fff;
            font-family: system-ui, -apple-system, "SF Pro Display", "Segoe UI", sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #breadcrumb {
            position: absolute; top: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 8px; align-items: center;
            opacity: 0; transition: opacity 0.3s; z-index: 20;
        }
        #breadcrumb.visible { opacity: 1; }
        .breadcrumb-dot { width: 6px; height: 6px; background: #fff; border-radius: 50%; opacity: 0.3; }
        .breadcrumb-arrow { color: #fff; opacity: 0.2; font-size: 10px; }

        #canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 55vh;
            display: flex; align-items: center; justify-content: center;
        }
        .canvas-inner { position: relative; width: 100%; height: 100%; max-width: 600px; }

        .thought-circle {
            position: absolute; background: #fff; border-radius: 50%;
            cursor: pointer; z-index: 10;
            transition: width 0.25s ease, height 0.25s ease, opacity 0.5s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .seed-thought {
            width: 60px; height: 60px;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
        }
        /* Seed glows when playing */
        .seed-thought.playing {
            box-shadow: 0 0 0 4px rgba(255,255,255,0.15), 0 0 0 8px rgba(255,255,255,0.06);
        }

        .sub-thought {
            width: 26px; height: 26px;
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.3);
        }
        .sub-thought.visible {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .sub-thought.focused { width: 32px; height: 32px; }

        /* Listened dot */
        .listened-dot {
            position: absolute; width: 5px; height: 5px;
            background: #fff; border-radius: 50%;
            bottom: -2px; right: -2px;
            pointer-events: none; z-index: 15;
        }

        /* Progress arc — SVG circle that fills as audio plays */
        .playing-arc {
            position: absolute;
            pointer-events: none; z-index: 9;
            transform: translate(-50%, -50%);
        }
        .playing-arc circle {
            fill: none;
            stroke: #ffffff;
            stroke-width: 1.5;
            stroke-linecap: round;
            transform-origin: center;
            transform: rotate(-90deg);
            transition: stroke-dashoffset 0.15s linear;
        }

        /* Content card */
        #content-card {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 42vh; background: #111;
            border-radius: 16px 16px 0 0;
            padding: 20px 20px 20px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        #content-card.visible { transform: translateY(0); }

        #thought-title { font-weight: 600; font-size: 15px; color: #fff; margin-bottom: 8px; }
        #thought-text { font-size: 13px; line-height: 1.65; color: #888; flex: 1; overflow-y: auto; margin-bottom: 14px; }

        #progress-bar {
            height: 1.5px; background: rgba(255,255,255,0.12);
            border-radius: 1px; margin-bottom: 16px; overflow: hidden;
        }
        #progress-fill { height: 100%; background: #fff; width: 0%; transition: width 0.1s linear; }

        #navigation { display: flex; justify-content: space-between; align-items: center; }
        .nav-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: #1e1e1e; border: none; color: #fff;
            font-size: 17px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s, transform 0.1s;
        }
        .nav-btn:active { transform: scale(0.9); background: #2a2a2a; }

        /* Hint text when children unlocked */
        #unlock-hint {
            position: absolute; bottom: 46vh; left: 50%;
            transform: translateX(-50%);
            font-size: 11px; letter-spacing: 0.08em;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            opacity: 0; transition: opacity 0.6s;
            white-space: nowrap; pointer-events: none;
        }
        #unlock-hint.visible { opacity: 1; }

        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 11px; letter-spacing: 0.25em;
            color: rgba(255,255,255,0.25); text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="loading">noema</div>
    <div id="breadcrumb"></div>
    <div id="unlock-hint"></div>
    <div id="canvas"><div class="canvas-inner"></div></div>

    <div id="content-card">
        <div id="thought-title"></div>
        <div id="thought-text"></div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <div id="navigation">
            <button class="nav-btn" id="back-button" title="Up level">↑</button>
            <button class="nav-btn" id="branch-button" title="Down level">↓</button>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        let thoughtTree = null, currentRoot = null;
        let currentThoughts = [], focusedIndex = 0;
        let navigationStack = [];
        let audioEl = document.getElementById('audio-player');
        let isDragging = false, lastAngle = 0, rotation = 0;
        let currentArc = null;
        const listenedSet = new Set();   // nodes listened >80%, resets on reload
        const unlockedSet = new Set();   // nodes whose children are revealed

        const ORBIT_RADIUS = 108;
        const SEED_TOP = 40;

        // ── Load ─────────────────────────────────────────────────────────────
        fetch('./thought-tree.json')
            .then(r => r.json())
            .then(data => {
                thoughtTree = data;
                currentRoot = thoughtTree.seed;
                document.getElementById('loading').style.display = 'none';
                renderThoughts();
                // Play seed immediately
                playSeed();
            })
            .catch(() => { document.getElementById('loading').textContent = 'error'; });

        // ── Seed playback ─────────────────────────────────────────────────────
        function playSeed() {
            audioEl.pause();
            removeArc();
            audioEl.src = `./audio/thought-${currentRoot.id}.mp3`;
            updateContentCard(currentRoot);
            audioEl.play().then(() => {
                const seedEl = document.querySelector('.seed-thought');
                if (seedEl) seedEl.classList.add('playing');
            }).catch(() => {});
        }

        // ── Render ────────────────────────────────────────────────────────────
        function renderThoughts() {
            const ci = document.querySelector('.canvas-inner');
            ci.innerHTML = '';
            removeArc();

            const seed = document.createElement('div');
            seed.className = 'thought-circle seed-thought';
            seed.addEventListener('click', () => {
                playSeed();
            });
            ci.appendChild(seed);

            currentThoughts = (currentRoot.children || []).map(id => thoughtTree.thoughts[id]);
            const step = currentThoughts.length ? (2 * Math.PI) / currentThoughts.length : 0;
            const isUnlocked = unlockedSet.has(currentRoot.id);

            currentThoughts.forEach((t, i) => {
                const angle = rotation + i * step - Math.PI / 2;
                const x = Math.cos(angle) * ORBIT_RADIUS;
                const y = Math.sin(angle) * ORBIT_RADIUS;

                const circle = document.createElement('div');
                circle.className = 'thought-circle sub-thought';
                circle.dataset.index = i;
                circle.style.left = `calc(50% + ${x}px)`;
                circle.style.top = `calc(${SEED_TOP}% + ${y}px)`;
                circle.style.transform = 'translate(-50%, -50%)';

                if (listenedSet.has(t.id)) {
                    const dot = document.createElement('div');
                    dot.className = 'listened-dot';
                    circle.appendChild(dot);
                }

                ci.appendChild(circle);

                // Reveal with stagger if unlocked
                if (isUnlocked) {
                    setTimeout(() => circle.classList.add('visible'), 60 + i * 60);
                }
            });

            updateBreadcrumb();

            // Update card to seed if no sub-thoughts visible yet
            if (!isUnlocked) {
                document.getElementById('content-card').classList.add('visible');
                updateContentCard(currentRoot);
                document.getElementById('back-button').style.display = navigationStack.length ? 'flex' : 'none';
                document.getElementById('branch-button').style.display = 'none';
            } else {
                updateFocus();
            }
        }

        function updatePositions() {
            const step = currentThoughts.length ? (2 * Math.PI) / currentThoughts.length : 0;
            document.querySelectorAll('.sub-thought').forEach((el, i) => {
                const angle = rotation + i * step - Math.PI / 2;
                el.style.left = `calc(50% + ${Math.cos(angle) * ORBIT_RADIUS}px)`;
                el.style.top = `calc(${SEED_TOP}% + ${Math.sin(angle) * ORBIT_RADIUS}px)`;
            });
        }

        // ── Focus ─────────────────────────────────────────────────────────────
        function getFocusedIndex() {
            if (!currentThoughts.length) return 0;
            const step = (2 * Math.PI) / currentThoughts.length;
            const target = Math.PI / 2;
            let best = 0, bestD = Infinity;
            currentThoughts.forEach((_, i) => {
                let a = ((rotation + i * step) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
                let d = Math.abs(a - target);
                if (d > Math.PI) d = 2 * Math.PI - d;
                if (d < bestD) { bestD = d; best = i; }
            });
            return best;
        }

        function updateFocus() {
            if (!unlockedSet.has(currentRoot.id)) return;
            document.querySelectorAll('.sub-thought').forEach(el => el.classList.remove('focused'));
            if (!currentThoughts.length) return;
            focusedIndex = getFocusedIndex();
            const el = document.querySelector(`[data-index="${focusedIndex}"]`);
            if (el) el.classList.add('focused');
            const t = currentThoughts[focusedIndex];
            updateContentCard(t);
            playSubThought(t);
        }

        // ── Content card ──────────────────────────────────────────────────────
        function updateContentCard(node) {
            document.getElementById('thought-title').textContent = node.title || '';
            document.getElementById('thought-text').textContent = node.text;
            document.getElementById('content-card').classList.add('visible');
            document.getElementById('back-button').style.display = navigationStack.length ? 'flex' : 'none';
            const canGoDown = node.children && node.children.length && unlockedSet.has(node.id);
            document.getElementById('branch-button').style.display = canGoDown ? 'flex' : 'none';
        }

        // ── Audio ─────────────────────────────────────────────────────────────
        function playSubThought(thought) {
            audioEl.pause();
            removeArc();
            document.querySelector('.seed-thought')?.classList.remove('playing');
            audioEl.src = `./audio/thought-${thought.id}.mp3`;
            audioEl.play().then(() => {
                const el = document.querySelector('.sub-thought.focused');
                if (el) createArc(el);
            }).catch(() => {});
        }

        function createArc(element) {
            removeArc();
            const d = element.offsetWidth + 10; // diameter of arc SVG
            const r = d / 2 - 2;               // circle radius inside SVG
            const circ = 2 * Math.PI * r;

            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.classList.add('playing-arc');
            svg.setAttribute('width', d);
            svg.setAttribute('height', d);
            svg.setAttribute('viewBox', `0 0 ${d} ${d}`);
            svg.style.left = element.style.left;
            svg.style.top = element.style.top;

            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', d / 2);
            circle.setAttribute('cy', d / 2);
            circle.setAttribute('r', r);
            circle.style.strokeDasharray = circ;
            circle.style.strokeDashoffset = circ; // starts empty
            svg.appendChild(circle);

            element.parentElement.appendChild(svg);
            currentArc = svg;
            currentArc._circ = circ;
        }

        function removeArc() {
            if (currentArc) { currentArc.remove(); currentArc = null; }
        }

        // ── Progress / listened tracking ──────────────────────────────────────
        audioEl.addEventListener('timeupdate', () => {
            if (!audioEl.duration) return;
            const pct = audioEl.currentTime / audioEl.duration;
            document.getElementById('progress-fill').style.width = `${pct * 100}%`;
            // Drive the arc
            if (currentArc && currentArc._circ) {
                const offset = currentArc._circ * (1 - pct);
                const circle = currentArc.querySelector('circle');
                if (circle) circle.style.strokeDashoffset = offset;
            }

            if (pct > 0.8) {
                // Which node is playing?
                const playingId = getPlayingNodeId();
                if (playingId && !listenedSet.has(playingId)) {
                    listenedSet.add(playingId);
                    markListened(playingId);
                }
            }
        });

        function getPlayingNodeId() {
            // Seed playing?
            if (document.querySelector('.seed-thought.playing')) return currentRoot.id;
            // Sub-thought
            if (currentThoughts.length && focusedIndex < currentThoughts.length)
                return currentThoughts[focusedIndex]?.id;
            return null;
        }

        function markListened(nodeId) {
            // Add dot to circle
            const el = document.querySelector(`.sub-thought.focused`) ||
                       document.querySelector(`[data-thought-id="${nodeId}"]`);
            if (el && !el.querySelector('.listened-dot')) {
                const dot = document.createElement('div');
                dot.className = 'listened-dot';
                el.appendChild(dot);
            }

            // If this is the current root (seed), unlock its children
            if (nodeId === currentRoot.id && currentRoot.children?.length && !unlockedSet.has(nodeId)) {
                unlockedSet.add(nodeId);
                revealChildren();
            }

            // Update branch button if a sub-thought
            const t = currentThoughts[focusedIndex];
            if (t && t.id === nodeId && t.children?.length) {
                unlockedSet.add(nodeId);
                document.getElementById('branch-button').style.display = 'flex';
            }
        }

        function revealChildren() {
            const hint = document.getElementById('unlock-hint');
            hint.textContent = 'new thoughts';
            hint.classList.add('visible');
            setTimeout(() => hint.classList.remove('visible'), 2500);

            const step = currentThoughts.length ? (2 * Math.PI) / currentThoughts.length : 0;
            document.querySelectorAll('.sub-thought').forEach((circle, i) => {
                setTimeout(() => circle.classList.add('visible'), 80 + i * 80);
            });

            // Start focus/playback on first sub-thought
            setTimeout(() => updateFocus(), currentThoughts.length * 80 + 200);
        }

        audioEl.addEventListener('ended', () => {
            document.getElementById('progress-fill').style.width = '0%';
            removeArc();
            document.querySelector('.seed-thought')?.classList.remove('playing');
        });
        audioEl.addEventListener('pause', () => {
            removeArc();
            document.querySelector('.seed-thought')?.classList.remove('playing');
        });

        // ── Navigation ────────────────────────────────────────────────────────
        document.getElementById('branch-button').addEventListener('click', () => {
            const t = currentThoughts[focusedIndex];
            if (!t?.children?.length || !unlockedSet.has(t.id)) return;
            navigationStack.push({ root: currentRoot, rotation, focusedIndex });
            currentRoot = t; rotation = 0;
            renderThoughts();
            playSeed();
        });

        document.getElementById('back-button').addEventListener('click', () => {
            if (!navigationStack.length) return;
            const p = navigationStack.pop();
            currentRoot = p.root; rotation = p.rotation; focusedIndex = p.focusedIndex;
            renderThoughts();
            // Restore: if parent was unlocked, update focus
            if (unlockedSet.has(currentRoot.id)) updateFocus();
        });

        // ── Drag ──────────────────────────────────────────────────────────────
        function getAngle(x, y) {
            const r = document.querySelector('.canvas-inner').getBoundingClientRect();
            return Math.atan2(y - (r.top + r.height * SEED_TOP / 100), x - (r.left + r.width / 2));
        }

        function handleStart(e) {
            if (!unlockedSet.has(currentRoot.id)) return; // can't rotate until unlocked
            if (!document.getElementById('canvas').contains(e.target)) return;
            if (e.target.classList.contains('seed-thought')) return;
            isDragging = true;
            const p = e.touches ? e.touches[0] : e;
            lastAngle = getAngle(p.clientX, p.clientY);
        }

        function handleMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            const p = e.touches ? e.touches[0] : e;
            const cur = getAngle(p.clientX, p.clientY);
            let d = cur - lastAngle;
            if (d > Math.PI) d -= 2 * Math.PI;
            if (d < -Math.PI) d += 2 * Math.PI;
            rotation += d; lastAngle = cur;
            updatePositions(); updateFocus();
        }

        function handleEnd() {
            if (!isDragging) return;
            isDragging = false;
            if (!currentThoughts.length) return;
            const step = (2 * Math.PI) / currentThoughts.length;
            rotation = Math.round(rotation / step) * step;
            updatePositions(); updateFocus();
        }

        document.addEventListener('mousedown', handleStart);
        document.addEventListener('mousemove', handleMove);
        document.addEventListener('mouseup', handleEnd);
        document.addEventListener('touchstart', handleStart, { passive: false });
        document.addEventListener('touchmove', handleMove, { passive: false });
        document.addEventListener('touchend', handleEnd);
        window.addEventListener('resize', renderThoughts);

        // ── Breadcrumb ────────────────────────────────────────────────────────
        function updateBreadcrumb() {
            const bc = document.getElementById('breadcrumb');
            bc.innerHTML = '';
            if (!navigationStack.length) { bc.classList.remove('visible'); return; }
            bc.classList.add('visible');
            bc.appendChild(Object.assign(document.createElement('div'), { className: 'breadcrumb-dot' }));
            navigationStack.forEach(() => {
                const a = document.createElement('span');
                a.className = 'breadcrumb-arrow'; a.textContent = '›';
                bc.appendChild(a);
                bc.appendChild(Object.assign(document.createElement('div'), { className: 'breadcrumb-dot' }));
            });
        }
    </script>
</body>
</html>
