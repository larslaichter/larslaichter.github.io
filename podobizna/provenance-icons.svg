<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>

    <!-- ══════════════════════════════════
         CONTENT TYPE ICONS
    ══════════════════════════════════ -->

    <!-- Image -->
    <symbol id="type-image" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="5" width="20" height="14" rx="1.5"/>
      <circle cx="8" cy="10" r="1.5"/>
      <polyline points="2,17 7,12 11,16 15,11 22,17"/>
    </symbol>

    <!-- Text -->
    <symbol id="type-text" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <line x1="4" y1="7"  x2="20" y2="7"/>
      <line x1="4" y1="11" x2="20" y2="11"/>
      <line x1="4" y1="15" x2="20" y2="15"/>
      <line x1="4" y1="19" x2="13" y2="19"/>
    </symbol>

    <!-- Voice -->
    <symbol id="type-voice" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="2" width="6" height="11" rx="3"/>
      <path d="M5 11a7 7 0 0 0 14 0"/>
      <line x1="12" y1="18" x2="12" y2="22"/>
      <line x1="8"  y1="22" x2="16" y2="22"/>
    </symbol>

    <!-- Video -->
    <symbol id="type-video" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="6" width="14" height="12" rx="1.5"/>
      <polygon points="16,10 22,7 22,17 16,14" stroke-linejoin="round"/>
    </symbol>

    <!-- ══════════════════════════════════
         PROVENANCE LEVEL ICONS (diamond)
    ══════════════════════════════════ -->

    <!-- Original: filled diamond -->
    <symbol id="prov-original" viewBox="0 0 24 24">
      <polygon points="12,2 22,12 12,22 2,12" fill="currentColor"/>
    </symbol>

    <!-- Derived: left-half filled, right-half outline -->
    <symbol id="prov-derived" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round">
      <polygon points="12,2 2,12 12,22" fill="currentColor" stroke="none"/>
      <polygon points="12,2 22,12 12,22" fill="none"/>
      <line x1="12" y1="2" x2="12" y2="22" stroke="currentColor" stroke-width="1.5"/>
    </symbol>

    <!-- Generated: outline diamond -->
    <symbol id="prov-generated" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round">
      <polygon points="12,2 22,12 12,22 2,12"/>
    </symbol>

  </defs>
</svg>
